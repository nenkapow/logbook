<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agen Gas Pro</title>

    <!-- PWA -->
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link id="app-icon" rel="apple-touch-icon" href="">
    <link id="fav-icon" rel="icon" type="image/png" href="">
    <link id="manifest-placeholder" rel="manifest" href="">

    <!-- ENGINE -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, textarea { font-size: 16px !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: popIn 0.15s ease-out; }
        .pb-safe { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    </style>

    <script>
        window.onerror = function(msg, url, line) {
            const e = document.getElementById('error-display');
            if (e) { e.style.display = 'block'; e.innerHTML = `<div class="p-2 border-b border-red-800">❌ ${msg} (Line ${line})</div>` + e.innerHTML; }
        };

        // Generate PNG icon tabung 3kg via Canvas (Chrome butuh PNG untuk install PWA)
        function makeTabungPNG(size) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const sc = size / 120;

            // Rounded background
            const r = size * 0.18;
            ctx.fillStyle = '#09090b';
            ctx.beginPath();
            ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
            ctx.quadraticCurveTo(size, 0, size, r);
            ctx.lineTo(size, size-r);
            ctx.quadraticCurveTo(size, size, size-r, size);
            ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
            ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath(); ctx.fill();

            // Scale & center cylinder (viewBox 80x120)
            const fit = Math.min((size * 0.72) / 80, (size * 0.9) / 120);
            const tx = (size - 80 * fit) / 2;
            const ty = (size - 120 * fit) / 2;
            ctx.save(); ctx.translate(tx, ty); ctx.scale(fit, fit);

            function rr(x, y, w, h, rx) {
                ctx.beginPath();
                ctx.moveTo(x+rx, y); ctx.lineTo(x+w-rx, y);
                ctx.quadraticCurveTo(x+w, y, x+w, y+rx);
                ctx.lineTo(x+w, y+h-rx);
                ctx.quadraticCurveTo(x+w, y+h, x+w-rx, y+h);
                ctx.lineTo(x+rx, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-rx);
                ctx.lineTo(x, y+rx); ctx.quadraticCurveTo(x, y, x+rx, y);
                ctx.closePath();
            }

            ctx.fillStyle = '#6366f1'; rr(14,44,52,62,10); ctx.fill();
            ctx.fillStyle = '#4f46e5'; ctx.beginPath(); ctx.ellipse(40,106,26,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#818cf8'; ctx.beginPath(); ctx.ellipse(40,44,26,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#4338ca'; rr(28,26,24,20,5); ctx.fill();
            ctx.fillStyle = '#3730a3'; rr(32,14,16,14,4); ctx.fill();
            ctx.fillStyle = '#312e81'; rr(22,20,36,5,2.5); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.2)'; rr(19,52,8,46,4); ctx.fill();
            ctx.fillStyle = '#4f46e5'; ctx.fillRect(14,94,52,8);
            ctx.fillStyle = 'white'; ctx.font = '900 13px "Arial Black",Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('3kg', 40, 81);

            ctx.restore();
            return c.toDataURL('image/png');
        }

        const icon192 = makeTabungPNG(192);
        const icon512 = makeTabungPNG(512);

        document.getElementById('app-icon').href = icon512;
        document.getElementById('fav-icon').href = icon192;

        const manifest = {
            name: "Agen Gas Pro",
            short_name: "AgenGas",
            description: "Sistem antrian & kasir LPG 3kg untuk agen gas",
            start_url: ".",
            display: "standalone",
            orientation: "portrait",
            background_color: "#09090b",
            theme_color: "#09090b",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        document.getElementById('manifest-placeholder').href = "data:application/json;base64," + btoa(JSON.stringify(manifest));

        // Tangkap install prompt sebelum React mount
        window._installPrompt = null;
        window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window._installPrompt = e; });

        // Service Worker — halaman ini mendaftar dirinya sendiri sebagai SW
        // Trik: SW mode dideteksi dari typeof window, sehingga satu file bisa jadi SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(location.href, { scope: './' })
                .catch(() => {
                    // Fallback blob jika browser blok registrasi page-as-SW
                    const swCode = `const C='agen-gas-v1';self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.add(location.pathname)))});self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
                    const b = new Blob([swCode], { type: 'text/javascript' });
                    navigator.serviceWorker.register(URL.createObjectURL(b)).catch(console.error);
                });
        }
    </script>
</head>
<body class="bg-zinc-950 font-sans">
    <div id="root"></div>
    <div id="error-display" style="display:none; position:fixed; bottom:0; left:0; right:0; background:black; color:#ff5555; font-size:10px; z-index:9999; max-height:100px; overflow:auto; opacity:0.9;"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const COL_CUSTOMERS = 'pelanggan_gas';
        const DOC_QUEUE = 'antrian_live';

        // Icon tabung mini untuk dipakai di dalam app
        const TabungIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 80 120" className={className}>
                <rect x="14" y="44" width="52" height="62" rx="10" fill="currentColor"/>
                <ellipse cx="40" cy="106" rx="26" ry="8" fill="currentColor" opacity="0.7"/>
                <ellipse cx="40" cy="44" rx="26" ry="8" fill="currentColor" opacity="0.85"/>
                <rect x="28" y="26" width="24" height="20" rx="5" fill="currentColor" opacity="0.8"/>
                <rect x="32" y="14" width="16" height="14" rx="4" fill="currentColor" opacity="0.7"/>
                <rect x="22" y="20" width="36" height="5" rx="2.5" fill="currentColor" opacity="0.6"/>
                <rect x="19" y="52" width="8" height="46" rx="4" fill="white" opacity="0.2"/>
                <text x="40" y="84" textAnchor="middle" fontFamily="Arial Black,Arial" fontWeight="900" fontSize="14" fill="white" opacity="0.95">3kg</text>
            </svg>
        );

        // --- ICONS ---
        const Icon = ({ name, size = 20, className = "", filled = false }) => {
            const paths = {
                home: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
                rocket: "M13 10V3L4 14h7v7l9-11h-7z",
                db: "M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4",
                search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
                check: "M5 13l4 4L19 7",
                plus: "M12 4v16m8-8H4",
                cart: "M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z",
                copy: "M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3",
                refresh: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15",
                spin: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15",
                trash: "M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16",
                x: "M6 18L18 6M6 6l12 12",
                pencil: "M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z",
                star: "M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
            };
            if (filled && name === 'star') {
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" className={className} width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                        <path d={paths.star} />
                    </svg>
                );
            }
            return (
                <svg xmlns="http://www.w3.org/2000/svg" className={`${className} ${name === 'spin' ? 'animate-spin' : ''}`} width={size} height={size} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={paths[name] || paths.home} />
                </svg>
            );
        };

        // --- KASIR VIEW ---
        const HomeView = ({ customers, queueIds, db, toggleQueue, toggleFavorit, resetSession, resetApp }) => {
            const [searchTerm, setSearchTerm] = useState('');

            const processedData = customers.filter(c =>
                (c.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (c.nik || '').includes(searchTerm)
            );

            processedData.sort((a, b) => {
                const aQ = queueIds.includes(a.id); const bQ = queueIds.includes(b.id);
                const aFull = (a.quota || 0) >= 4; const bFull = (b.quota || 0) >= 4;
                const aD = a.weeklyDone; const bD = b.weeklyDone;
                const aFav = a.favorit; const bFav = b.favorit;
                let sA = 0, sB = 0;
                if (aQ) sA = 3; else if (aD) sA = 2; else if (aFull) sA = 1; else if (aFav) sA = -1;
                if (bQ) sB = 3; else if (bD) sB = 2; else if (bFull) sB = 1; else if (bFav) sB = -1;
                if (sA !== sB) return sA - sB;
                return (a.name || '').localeCompare(b.name || '');
            });

            const qCount = queueIds.length;
            const doneCount = customers.filter(c => c.weeklyDone).length;

            return (
                <div className="flex flex-col h-full bg-zinc-950">
                    {/* HEADER */}
                    <div className="px-4 pt-4 pb-3 sticky top-0 z-10 bg-zinc-950 border-b border-zinc-800">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-700 shadow-lg">
                                    <TabungIcon size={28} className="text-indigo-500" />
                                </div>
                                <div>
                                    <h1 className="text-white font-black text-lg leading-none tracking-tight">Agen Gas Pro</h1>
                                    <p className="text-zinc-500 text-[10px] font-medium">Kasir & Antrian LPG 3kg</p>
                                </div>
                            </div>
                            <div className="flex gap-1.5">
                                <button onClick={resetSession} className="text-[10px] bg-zinc-800 text-zinc-300 px-2.5 py-1.5 rounded-lg font-bold border border-zinc-700">RESET MINGGU</button>
                                <button onClick={resetApp} className="text-[10px] text-zinc-600 border border-zinc-800 px-2.5 py-1.5 rounded-lg font-bold">LOGOUT</button>
                            </div>
                        </div>

                        {/* STATS */}
                        <div className="flex gap-2 mb-3">
                            <div className="flex-1 bg-zinc-900 rounded-xl p-2.5 flex items-center gap-2 border border-zinc-800">
                                <div className="w-7 h-7 bg-indigo-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <Icon name="cart" size={14} className="text-indigo-400" />
                                </div>
                                <div>
                                    <p className="text-indigo-400 font-black text-base leading-none">{qCount}</p>
                                    <p className="text-zinc-600 text-[9px] font-bold uppercase">Antrian</p>
                                </div>
                            </div>
                            <div className="flex-1 bg-zinc-900 rounded-xl p-2.5 flex items-center gap-2 border border-zinc-800">
                                <div className="w-7 h-7 bg-emerald-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <Icon name="check" size={14} className="text-emerald-400" />
                                </div>
                                <div>
                                    <p className="text-emerald-400 font-black text-base leading-none">{doneCount}</p>
                                    <p className="text-zinc-600 text-[9px] font-bold uppercase">Selesai</p>
                                </div>
                            </div>
                            <div className="flex-1 bg-zinc-900 rounded-xl p-2.5 flex items-center gap-2 border border-zinc-800">
                                <div className="w-7 h-7 bg-blue-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <Icon name="db" size={14} className="text-blue-400" />
                                </div>
                                <div>
                                    <p className="text-blue-400 font-black text-base leading-none">{customers.length}</p>
                                    <p className="text-zinc-600 text-[9px] font-bold uppercase">Total</p>
                                </div>
                            </div>
                        </div>

                        {/* SEARCH */}
                        <div className="relative">
                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600">
                                <Icon name="search" size={16} />
                            </div>
                            <input type="text" placeholder="Cari nama atau NIK..."
                                className="w-full pl-9 pr-4 py-2.5 bg-zinc-900 border border-zinc-800 text-zinc-100 placeholder-zinc-600 rounded-xl text-sm outline-none focus:border-indigo-500 transition-colors"
                                value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    {/* LIST */}
                    <div className="flex-1 overflow-y-auto p-3 pb-36 no-scrollbar">
                        {qCount > 0 && (
                            <button onClick={() => db.collection('system').doc(DOC_QUEUE).update({ ids: [] })}
                                className="w-full mb-3 flex items-center justify-center gap-2 text-xs text-red-400 bg-red-950/30 border border-red-900/40 py-2 rounded-xl font-bold">
                                <Icon name="trash" size={12} /> Kosongkan Antrian
                            </button>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                            {processedData.map(c => {
                                const inQueue = queueIds.includes(c.id);
                                const isFull = (c.quota || 0) >= 4;
                                const isDone = c.weeklyDone;
                                const isFav = c.favorit;

                                let cardBg = "bg-zinc-900 border-zinc-800";
                                let avatarBg = "bg-zinc-800 text-zinc-400";
                                let nameCls = "text-zinc-100";

                                if (inQueue) { cardBg = "bg-emerald-950/60 border-emerald-800/70"; avatarBg = "bg-emerald-600 text-white"; nameCls = "text-emerald-300"; }
                                else if (isFav && !isDone && !isFull) { cardBg = "bg-indigo-950/50 border-indigo-800/60"; avatarBg = "bg-indigo-500 text-white"; nameCls = "text-indigo-300"; }
                                else if (isFull) { cardBg = "bg-red-950/40 border-red-900/50"; avatarBg = "bg-red-900/60 text-red-400"; nameCls = "text-red-400"; }
                                else if (isDone) { cardBg = "bg-zinc-900/50 border-zinc-800/50"; nameCls = "text-zinc-500"; avatarBg = "bg-zinc-800/50 text-zinc-600"; }

                                return (
                                    <div key={c.id} className={`border rounded-2xl transition-all animate-fade-in overflow-hidden ${cardBg} ${(isDone || isFull) && !inQueue ? 'opacity-60' : ''}`}>
                                        <div className="flex items-center p-3 gap-3 cursor-pointer active:scale-[0.98] transition-transform" onClick={() => toggleQueue(c)}>
                                            {/* AVATAR */}
                                            <div className={`w-11 h-11 rounded-xl flex items-center justify-center font-black text-lg flex-shrink-0 ${avatarBg}`}>
                                                {(c.name || '?').charAt(0)}
                                            </div>

                                            {/* INFO */}
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-1.5 mb-0.5">
                                                    {isFav && <Icon name="star" size={11} filled className="text-indigo-500 flex-shrink-0" />}
                                                    <span className={`font-bold text-sm truncate ${nameCls}`}>{c.name}</span>
                                                    {isDone && !inQueue && <span className="text-[9px] bg-zinc-800 text-zinc-500 px-1.5 py-0.5 rounded-full font-bold flex-shrink-0 border border-zinc-700">Selesai</span>}
                                                </div>
                                                <div className="text-zinc-600 text-xs font-mono mb-1.5">{c.nik}</div>
                                                <div className="flex items-center gap-1">
                                                    {[...Array(4)].map((_, i) => (
                                                        <div key={i} className={`h-1 flex-1 rounded-full transition-colors ${i < (c.quota || 0) ? (isFull ? 'bg-red-500' : 'bg-indigo-500') : 'bg-zinc-700'}`} />
                                                    ))}
                                                    <span className="text-[9px] text-zinc-600 font-bold ml-1">{c.quota || 0}/4</span>
                                                </div>
                                            </div>

                                            {/* ACTION */}
                                            <div className="flex-shrink-0">
                                                {inQueue
                                                    ? <div className="w-9 h-9 bg-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-900/50"><Icon name="check" size={18} className="text-white" /></div>
                                                    : isFull
                                                        ? <span className="text-[10px] font-black text-red-400 bg-red-950/60 border border-red-900/50 px-2 py-1.5 rounded-xl">PENUH</span>
                                                        : <div className="w-9 h-9 bg-indigo-500/20 border border-indigo-500/30 rounded-xl flex items-center justify-center"><Icon name="plus" size={18} className="text-indigo-400" /></div>
                                                }
                                            </div>
                                        </div>

                                        {/* FAVORITE TOGGLE */}
                                        <button onClick={e => { e.stopPropagation(); toggleFavorit(c); }}
                                            className={`w-full border-t py-1.5 flex items-center justify-center gap-1.5 text-[10px] font-bold transition-colors ${isFav ? 'border-indigo-900/50 bg-indigo-950/40 text-indigo-500' : 'border-zinc-800 text-zinc-700 hover:text-indigo-500 hover:bg-indigo-950/20'}`}>
                                            <Icon name="star" size={11} filled={isFav} />
                                            {isFav ? 'FAVORIT ★' : 'TANDAI FAVORIT'}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* FLOATING BUTTON */}
                    {qCount > 0 && (
                        <div onClick={() => document.getElementById('btn-report').click()}
                            className="absolute bottom-20 left-3 right-3 md:left-auto md:right-8 md:bottom-24 md:w-96 bg-indigo-500 text-white p-4 rounded-2xl shadow-2xl shadow-indigo-950/80 flex justify-between items-center cursor-pointer z-30 active:scale-95 transition-transform animate-fade-in">
                            <div className="flex items-center gap-3">
                                <div className="bg-black/20 w-10 h-10 rounded-xl flex items-center justify-center">
                                    <Icon name="cart" size={20} />
                                </div>
                                <div>
                                    <p className="font-black text-lg leading-none">{qCount} Antrian</p>
                                    <p className="text-indigo-200 text-[11px]">Tap untuk proses setor</p>
                                </div>
                            </div>
                            <div className="bg-black/25 px-4 py-2 rounded-xl font-black text-sm flex items-center gap-1.5">
                                SETOR <Icon name="rocket" size={14} />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- SETOR VIEW ---
        const ReportView = ({ customers, queueIds, db, toggleQueue, executeCopyAndNext }) => {
            const [lastCopied, setLastCopied] = useState(null);

            const handleCopy = async (c) => { await executeCopyAndNext(c); setLastCopied({ ...c }); };

            const confirmPaste = async () => {
                if (!lastCopied) return;
                const b = db.batch();
                b.update(db.collection(COL_CUSTOMERS).doc(lastCopied.id), { quota: (lastCopied.quota || 0) + 1, lastTx: new Date().toLocaleDateString('id-ID'), weeklyDone: true });
                b.update(db.collection('system').doc(DOC_QUEUE), { ids: queueIds.filter(q => q !== lastCopied.id) });
                await b.commit();
                setLastCopied(null);
            };

            const current = customers.find(c => c.id === queueIds[0]);

            return (
                <div className="flex flex-col h-full bg-zinc-950">
                    {/* HEADER */}
                    <div className="px-4 pt-4 pb-3 border-b border-zinc-800 bg-zinc-950">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2.5">
                                <div className="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-700">
                                    <TabungIcon size={28} className="text-indigo-500" />
                                </div>
                                <div>
                                    <h2 className="font-black text-white text-lg leading-none">Proses Setor</h2>
                                    <p className="text-zinc-500 text-[10px] font-medium">Copy NIK ke aplikasi GAS</p>
                                </div>
                            </div>
                            <div className="bg-indigo-500/10 border border-indigo-500/25 px-3 py-1.5 rounded-xl">
                                <span className="text-indigo-400 font-black text-base">{queueIds.length}</span>
                                <span className="text-zinc-600 text-[10px] font-bold ml-1">antrian</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-4 flex flex-col items-center overflow-y-auto pb-28 no-scrollbar">
                        {queueIds.length === 0 ? (
                            <div className="text-center mt-24 space-y-4 animate-fade-in">
                                <div className="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mx-auto border border-zinc-800">
                                    <Icon name="check" size={40} className="text-emerald-400" />
                                </div>
                                <h3 className="text-2xl font-black text-zinc-300">Semua Beres!</h3>
                                <p className="text-zinc-600 text-sm">Antrian sudah kosong</p>
                            </div>
                        ) : (
                            <div className="w-full max-w-md animate-fade-in space-y-4">
                                {/* CURRENT CARD */}
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                                    <div className="bg-indigo-500 px-4 py-2.5 flex justify-between items-center">
                                        <span className="text-white font-black text-xs uppercase tracking-wider">⚡ Sedang Diproses</span>
                                        <span className="text-indigo-100 text-xs font-mono font-bold">Kuota: {(current?.quota || 0)}/4</span>
                                    </div>
                                    <div className="p-5">
                                        <div className="flex items-center gap-3 mb-5">
                                            <div className="w-14 h-14 bg-indigo-500/15 border border-indigo-500/30 rounded-xl flex items-center justify-center font-black text-3xl text-indigo-400 flex-shrink-0">
                                                {(current?.name || '?').charAt(0)}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h2 className="text-xl font-black text-zinc-100 truncate">{current?.name}</h2>
                                                <div className="flex gap-1 mt-2">
                                                    {[...Array(4)].map((_, i) => (
                                                        <div key={i} className={`h-2 w-8 rounded-full ${i < (current?.quota || 0) ? 'bg-indigo-500' : 'bg-zinc-700'}`} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        {/* NIK BOX */}
                                        <div className="bg-zinc-950 border-2 border-dashed border-zinc-700 rounded-2xl p-4 text-center mb-5">
                                            <p className="text-[10px] text-zinc-600 font-black uppercase tracking-widest mb-1">NIK</p>
                                            <span className="font-mono text-2xl font-black tracking-widest text-zinc-100">{current?.nik}</span>
                                        </div>

                                        {!lastCopied ? (
                                            <button onClick={() => handleCopy(current)}
                                                className="w-full bg-indigo-500 active:scale-95 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-lg shadow-indigo-950 transition-all animate-pulse">
                                                <Icon name="copy" size={20} /> 1. COPY NIK
                                            </button>
                                        ) : (
                                            <div className="space-y-2.5 animate-pop">
                                                <div className="text-center text-emerald-400 font-bold text-sm bg-emerald-950/50 border border-emerald-800/60 p-2.5 rounded-xl flex items-center justify-center gap-2">
                                                    <Icon name="check" size={16} /> NIK Sudah Dicopy!
                                                </div>
                                                <button onClick={confirmPaste}
                                                    className="w-full bg-emerald-600 active:scale-95 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-lg shadow-emerald-950 transition-all">
                                                    <Icon name="check" size={20} /> 2. SUDAH PASTE (LANJUT)
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* NEXT QUEUE */}
                                {queueIds.length > 1 && (
                                    <div className="space-y-2">
                                        <p className="text-xs font-black text-zinc-600 uppercase tracking-wider">Berikutnya ({queueIds.length - 1}):</p>
                                        {queueIds.slice(1, 4).map((qid, i) => {
                                            const c = customers.find(x => x.id === qid);
                                            return c ? (
                                                <div key={qid} className="bg-zinc-900 border border-zinc-800 p-3 rounded-xl flex items-center gap-3 animate-fade-in">
                                                    <div className="w-8 h-8 bg-zinc-800 rounded-lg flex items-center justify-center font-black text-zinc-500 text-sm flex-shrink-0">{i + 2}</div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-zinc-200 font-bold text-sm truncate">{c.name}</p>
                                                        <p className="text-zinc-600 text-xs font-mono">{c.nik}</p>
                                                    </div>
                                                    <button onClick={() => toggleQueue(c)} className="w-8 h-8 bg-zinc-800 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-950/50 transition-colors flex-shrink-0">
                                                        <Icon name="x" size={14} />
                                                    </button>
                                                </div>
                                            ) : null;
                                        })}
                                        {queueIds.length > 4 && <p className="text-xs text-zinc-700 text-center font-bold">+{queueIds.length - 4} lainnya...</p>}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- DATA VIEW ---
        const DbView = ({ customers, db, queueIds, toggleFavorit }) => {
            const [form, setForm] = useState({ name: '', nik: '' });
            const [editId, setEditId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [dbSearch, setDbSearch] = useState('');

            const handleSave = async () => {
                if (!form.name || !form.nik) return alert("Isi nama dan NIK!");
                setSaving(true);
                try {
                    const d = { name: form.name.toUpperCase(), nik: form.nik };
                    if (editId) { await db.collection(COL_CUSTOMERS).doc(editId).update(d); setEditId(null); }
                    else { if (customers.some(c => c.nik === form.nik)) throw new Error("NIK sudah ada!"); await db.collection(COL_CUSTOMERS).add({ ...d, quota: 0, lastTx: '-', favorit: false }); }
                    setForm({ name: '', nik: '' });
                    alert("Sukses!");
                } catch (e) { alert(e.message); }
                setSaving(false);
            };

            const del = async (id) => { if (confirm("Hapus pelanggan ini?")) await db.collection(COL_CUSTOMERS).doc(id).delete(); };

            const resetMonthly = async () => {
                if (!confirm("⚠️ YAKIN RESET BULANAN?\n\nSemua kuota akan dikembalikan ke 0.")) return;
                const b = db.batch();
                customers.forEach(c => b.update(db.collection(COL_CUSTOMERS).doc(c.id), { quota: 0 }));
                await b.commit();
                alert("Kuota Bulanan Direset!");
            };

            const filteredDb = customers
                .filter(c => (c.name || '').toLowerCase().includes(dbSearch.toLowerCase()) || (c.nik || '').includes(dbSearch))
                .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

            const favCount = customers.filter(c => c.favorit).length;

            return (
                <div className="flex flex-col h-full bg-zinc-950">
                    {/* HEADER */}
                    <div className="px-4 pt-4 pb-3 sticky top-0 z-10 bg-zinc-950 border-b border-zinc-800">
                        <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2.5">
                                <div className="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-700">
                                    <Icon name="db" size={18} className="text-blue-400" />
                                </div>
                                <div>
                                    <h2 className="font-black text-white text-lg leading-none">Database</h2>
                                    <p className="text-zinc-500 text-[10px] font-medium">{customers.length} pelanggan · {favCount} favorit</p>
                                </div>
                            </div>
                            <button onClick={resetMonthly} className="text-[10px] bg-red-950/40 text-red-400 px-3 py-1.5 rounded-lg font-bold border border-red-900/50 flex items-center gap-1">
                                <Icon name="refresh" size={11} /> RESET KUOTA
                            </button>
                        </div>
                        <div className="relative">
                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600"><Icon name="search" size={16} /></div>
                            <input placeholder="Cari data pelanggan..."
                                className="w-full pl-9 pr-3 py-2.5 bg-zinc-900 border border-zinc-800 text-zinc-100 placeholder-zinc-600 rounded-xl text-sm outline-none focus:border-blue-500 transition-colors"
                                value={dbSearch} onChange={e => setDbSearch(e.target.value)} />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-28 no-scrollbar">
                        {/* FORM */}
                        <div className={`rounded-2xl border p-4 mb-5 ${editId ? 'bg-amber-950/30 border-amber-800/50' : 'bg-zinc-900 border-zinc-800'}`}>
                            <h3 className="font-black text-sm mb-3 text-zinc-300">{editId ? '✏️ Edit Pelanggan' : '➕ Tambah Pelanggan Baru'}</h3>
                            <input placeholder="Nama Lengkap"
                                className="w-full p-3 bg-zinc-950 border border-zinc-800 text-zinc-100 placeholder-zinc-600 rounded-xl mb-2 outline-none focus:border-blue-500 transition-colors text-sm"
                                value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                            <input placeholder="NIK"
                                className="w-full p-3 bg-zinc-950 border border-zinc-800 text-zinc-100 placeholder-zinc-600 rounded-xl mb-3 outline-none focus:border-blue-500 transition-colors text-sm font-mono"
                                value={form.nik} onChange={e => setForm({ ...form, nik: e.target.value })} />
                            <div className="flex gap-2">
                                <button onClick={handleSave} disabled={saving}
                                    className={`flex-1 py-3 rounded-xl font-black text-white text-sm active:scale-95 transition-all ${editId ? 'bg-amber-500' : 'bg-blue-600'}`}>
                                    {saving ? '...' : editId ? 'UPDATE' : 'SIMPAN'}
                                </button>
                                {editId && <button onClick={() => { setEditId(null); setForm({ name: '', nik: '' }); }} className="bg-zinc-800 text-zinc-300 px-5 rounded-xl font-black text-sm active:scale-95 border border-zinc-700">BATAL</button>}
                            </div>
                        </div>

                        {/* LIST */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                            {filteredDb.map(c => (
                                <div key={c.id} className={`bg-zinc-900 border rounded-2xl overflow-hidden transition-all ${c.favorit ? 'border-indigo-800/60' : 'border-zinc-800'}`}>
                                    <div className="p-3 flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-base flex-shrink-0 ${c.favorit ? 'bg-indigo-500 text-white' : 'bg-zinc-800 text-zinc-400'}`}>
                                            {(c.name || '?').charAt(0)}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-1 mb-0.5">
                                                {c.favorit && <Icon name="star" size={10} filled className="text-indigo-500 flex-shrink-0" />}
                                                <p className="font-bold text-sm truncate text-zinc-100">{c.name}</p>
                                            </div>
                                            <p className="text-xs text-zinc-600 font-mono">{c.nik}</p>
                                            <div className="flex items-center gap-1 mt-1.5">
                                                {[...Array(4)].map((_, i) => (
                                                    <div key={i} className={`h-1 w-5 rounded-full ${i < (c.quota || 0) ? 'bg-indigo-500' : 'bg-zinc-700'}`} />
                                                ))}
                                                <span className={`text-[9px] font-black ml-1 ${(c.quota || 0) >= 4 ? 'text-red-400' : 'text-zinc-600'}`}>{c.quota || 0}/4</span>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-1.5 flex-shrink-0">
                                            <button onClick={() => { setForm({ name: c.name, nik: c.nik }); setEditId(c.id); }} className="w-8 h-8 bg-zinc-800 text-blue-400 rounded-lg flex items-center justify-center hover:bg-blue-950/50 transition-colors border border-zinc-700">
                                                <Icon name="pencil" size={13} />
                                            </button>
                                            <button onClick={() => del(c.id)} className="w-8 h-8 bg-zinc-800 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-950/50 transition-colors border border-zinc-700">
                                                <Icon name="trash" size={13} />
                                            </button>
                                        </div>
                                    </div>
                                    <button onClick={() => toggleFavorit(c)}
                                        className={`w-full border-t py-1.5 flex items-center justify-center gap-1.5 text-[10px] font-black transition-colors ${c.favorit ? 'border-indigo-900/50 bg-indigo-950/30 text-indigo-500' : 'border-zinc-800 text-zinc-700 hover:text-indigo-500 hover:bg-indigo-950/20'}`}>
                                        <Icon name="star" size={11} filled={c.favorit} />
                                        {c.favorit ? 'FAVORIT ★' : 'TANDAI FAVORIT'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const MainApp = ({ config }) => {
            if (!firebase.apps.length) firebase.initializeApp(config);
            const db = firebase.firestore();
            const auth = firebase.auth();
            const [view, setView] = useState('home');
            const [customers, setCustomers] = useState([]);
            const [queueIds, setQueueIds] = useState([]);

            useEffect(() => {
                auth.setPersistence(firebase.auth.Auth.Persistence.NONE).then(() => auth.signInAnonymously()).catch(e => console.error("Auth Fail", e));
                db.collection(COL_CUSTOMERS).onSnapshot(s => setCustomers(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                db.collection('system').doc(DOC_QUEUE).onSnapshot(s => {
                    if (s.exists) setQueueIds(s.data().ids || []);
                    else db.collection('system').doc(DOC_QUEUE).set({ ids: [] });
                });
            }, []);

            const toggleQueue = async (c) => {
                if (queueIds.includes(c.id)) { await db.collection('system').doc(DOC_QUEUE).update({ ids: queueIds.filter(q => q !== c.id) }); return; }
                if ((c.quota || 0) >= 4) { alert(`⛔ DITOLAK!\n\n${c.name} kuotanya sudah HABIS (4/4).`); return; }
                if (c.weeklyDone && !confirm(`⚠️ ${c.name} SUDAH BELANJA MINGGU INI.\nYakin mau antri lagi?`)) return;
                await db.collection('system').doc(DOC_QUEUE).update({ ids: [...queueIds, c.id] });
            };

            const toggleFavorit = async (c) => {
                await db.collection(COL_CUSTOMERS).doc(c.id).update({ favorit: !c.favorit });
            };

            const resetSession = async () => {
                if (!confirm("🔄 MULAI MINGGU BARU (Selasa/Sabtu)?\n\nSemua status 'Sudah Belanja' akan dihapus.\nNama pelanggan akan naik lagi ke atas.")) return;
                const b = db.batch();
                b.update(db.collection('system').doc(DOC_QUEUE), { ids: [] });
                customers.forEach(c => b.update(db.collection(COL_CUSTOMERS).doc(c.id), { weeklyDone: false }));
                await b.commit();
                alert("MINGGU Baru Dimulai! List Bersih.");
            };

            const executeCopyAndNext = async (c) => {
                try { await navigator.clipboard.writeText(c.nik); }
                catch (e) { const t = document.createElement("textarea"); t.value = c.nik; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
            };

            const resetApp = () => { if (confirm("LOGOUT?")) { localStorage.removeItem('agen_gas_config'); window.location.reload(); } };

            const tabs = [
                { id: 'home', icon: 'home', label: 'KASIR' },
                { id: 'report', icon: 'rocket', label: 'SETOR', badge: queueIds.length },
                { id: 'db', icon: 'db', label: 'DATA' },
            ];

            return (
                <div className="h-screen w-full md:max-w-6xl mx-auto flex flex-col relative overflow-hidden bg-zinc-950 md:border-x md:border-zinc-800">
                    <div className="flex-1 overflow-hidden">
                        {view === 'home' && <HomeView customers={customers} queueIds={queueIds} db={db} toggleQueue={toggleQueue} toggleFavorit={toggleFavorit} resetSession={resetSession} resetApp={resetApp} />}
                        {view === 'report' && <ReportView customers={customers} queueIds={queueIds} db={db} toggleQueue={toggleQueue} executeCopyAndNext={executeCopyAndNext} />}
                        {view === 'db' && <DbView customers={customers} db={db} queueIds={queueIds} toggleFavorit={toggleFavorit} />}
                    </div>

                    {/* BOTTOM NAV */}
                    <div className="bg-zinc-950 border-t border-zinc-800 flex justify-around items-center px-2 py-2 pb-safe z-20">
                        {tabs.map(tab => (
                            <button key={tab.id} id={tab.id === 'report' ? 'btn-report' : undefined}
                                onClick={() => setView(tab.id)}
                                className={`flex flex-col items-center py-2 px-6 rounded-xl transition-all ${view === tab.id ? 'bg-indigo-500/10' : 'hover:bg-zinc-900'}`}>
                                <div className="relative mb-0.5">
                                    <Icon name={tab.icon} size={22} className={view === tab.id ? 'text-indigo-400' : 'text-zinc-600'} />
                                    {tab.badge > 0 && <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex justify-center items-center font-black">{tab.badge}</span>}
                                </div>
                                <span className={`text-[10px] font-black ${view === tab.id ? 'text-indigo-400' : 'text-zinc-600'}`}>{tab.label}</span>
                                {view === tab.id && <div className="w-1.5 h-1.5 rounded-full bg-indigo-500 mt-0.5" />}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- SETUP SCREEN ---
        const SetupScreen = ({ onSave }) => {
            const [code, setCode] = useState('');
            const [error, setError] = useState('');
            const handleActivate = () => {
                try { const config = JSON.parse(atob(code)); if (!config.apiKey) throw new Error(); localStorage.setItem('agen_gas_config', JSON.stringify(config)); onSave(config); }
                catch (e) { setError("Kode Lisensi tidak valid!"); }
            };
            return (
                <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6">
                    <div className="w-28 h-28 bg-zinc-900 border border-zinc-800 rounded-3xl flex items-center justify-center mb-6 shadow-2xl">
                        <TabungIcon size={72} className="text-indigo-500" />
                    </div>
                    <h1 className="text-white text-3xl font-black mb-1 tracking-tight">Agen Gas Pro</h1>
                    <p className="text-zinc-500 text-sm mb-8 font-medium">Sistem Antrian & Kasir LPG 3kg</p>
                    <div className="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-6 rounded-2xl">
                        <h2 className="text-white font-black mb-1 text-center">Aktivasi Lisensi</h2>
                        <p className="text-zinc-600 text-xs text-center mb-4">Tempel kode lisensi dari agen</p>
                        <textarea rows={4} placeholder="Kode lisensi..."
                            className="w-full p-3 bg-zinc-950 border border-zinc-800 text-zinc-100 placeholder-zinc-700 rounded-xl mb-3 outline-none focus:border-indigo-500 transition-colors text-sm font-mono resize-none"
                            value={code} onChange={e => { setCode(e.target.value); setError(''); }}></textarea>
                        {error && <p className="text-red-400 text-xs text-center mb-3 font-bold">{error}</p>}
                        <button onClick={handleActivate}
                            className="w-full bg-indigo-500 active:scale-95 text-white py-4 rounded-xl font-black text-sm transition-all shadow-lg shadow-indigo-950">
                            AKTIFKAN
                        </button>
                    </div>
                    <p className="text-zinc-800 text-[11px] mt-6 font-medium">v2.0 · Hubungi agen untuk mendapatkan kode</p>
                </div>
            );
        };

        // --- INSTALL BANNER ---
        const InstallBanner = () => {
            const [prompt, setPrompt] = useState(window._installPrompt);
            const [visible, setVisible] = useState(false);
            const [isIOS, setIsIOS] = useState(false);

            useEffect(() => {
                // Jangan tampil kalau sudah standalone atau pernah dismiss
                if (window.matchMedia('(display-mode: standalone)').matches) return;
                if (localStorage.getItem('pwa_dismissed')) return;

                const ios = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
                setIsIOS(ios);

                if (ios) {
                    // iOS tidak punya beforeinstallprompt, tampil manual guide
                    setTimeout(() => setVisible(true), 1500);
                    return;
                }

                // Android/Desktop: pakai event yang sudah ditangkap
                if (window._installPrompt) { setVisible(true); return; }
                const handler = e => { e.preventDefault(); window._installPrompt = e; setPrompt(e); setVisible(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!prompt) return;
                prompt.prompt();
                const { outcome } = await prompt.userChoice;
                setVisible(false);
                window._installPrompt = null;
            };

            const handleDismiss = () => {
                setVisible(false);
                localStorage.setItem('pwa_dismissed', '1');
            };

            if (!visible) return null;

            if (isIOS) return (
                <div className="fixed bottom-20 left-3 right-3 z-50 animate-fade-in">
                    <div className="bg-zinc-900 border border-zinc-700 rounded-2xl p-4 shadow-2xl">
                        <div className="flex items-start gap-3">
                            <div className="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center border border-zinc-700 flex-shrink-0">
                                <TabungIcon size={28} className="text-indigo-400" />
                            </div>
                            <div className="flex-1">
                                <p className="text-white font-black text-sm">Install ke Home Screen</p>
                                <p className="text-zinc-400 text-xs mt-1 leading-relaxed">
                                    Tap <span className="text-indigo-400 font-bold">⎙ Share</span> di browser Safari, lalu pilih <span className="text-indigo-400 font-bold">"Add to Home Screen"</span>
                                </p>
                            </div>
                            <button onClick={handleDismiss} className="text-zinc-600 hover:text-zinc-400 flex-shrink-0">
                                <Icon name="x" size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="fixed bottom-20 left-3 right-3 z-50 animate-fade-in">
                    <div className="bg-indigo-950 border border-indigo-800/60 rounded-2xl shadow-2xl shadow-indigo-950 overflow-hidden">
                        <div className="flex items-center gap-3 p-4">
                            <div className="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 flex-shrink-0">
                                <TabungIcon size={34} className="text-indigo-400" />
                            </div>
                            <div className="flex-1 min-w-0">
                                <p className="text-white font-black text-sm leading-none mb-0.5">Install Agen Gas Pro</p>
                                <p className="text-indigo-300 text-xs">Akses cepat, bisa pakai offline!</p>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                                <button onClick={handleDismiss} className="text-zinc-600 hover:text-zinc-400 text-xs px-2 py-1 font-bold">Nanti</button>
                                <button onClick={handleInstall} className="bg-indigo-500 text-white px-4 py-2 rounded-xl font-black text-xs active:scale-95 transition-all shadow-lg shadow-indigo-900">
                                    INSTALL
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- ROOT ---
        const Root = () => {
            // Lazy initializer: baca localStorage SEBELUM render pertama, bukan setelah
            // Ini mencegah flash SetupScreen walau config sudah ada
            const [config, setConfig] = useState(() => {
                try { const s = localStorage.getItem('agen_gas_config'); return s ? JSON.parse(s) : null; }
                catch (e) { return null; }
            });
            return (
                <>
                    {!config ? <SetupScreen onSave={setConfig} /> : <MainApp config={config} />}
                    <InstallBanner />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
